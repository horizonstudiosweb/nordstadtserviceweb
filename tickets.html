<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Tickets - Nordstadt Roleplay</title>

  <meta
    name="description"
    content="Das alte Ticketportal wurde in das neue Nordstadt Support-Center integriert."
  />

  <meta http-equiv="refresh" content="2; url=support-center.html#myTicketsSection" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --bg: #05040d;
      --panel: rgba(18, 14, 34, 0.78);
      --line: rgba(255, 255, 255, 0.145);
      --text: #fff7ff;
      --muted: rgba(255, 235, 255, 0.7);
      --pink: #ff4fd8;
      --violet: #8d5cff;
      --sunset: #ff9a5c;
      --radius: 34px;
      --shadow: 0 28px 90px rgba(0, 0, 0, 0.48);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg);
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 8% 8%, rgba(255, 79, 216, 0.2), transparent 30%),
        radial-gradient(circle at 92% 12%, rgba(141, 92, 255, 0.17), transparent 34%),
        radial-gradient(circle at 56% 96%, rgba(255, 154, 92, 0.11), transparent 36%),
        linear-gradient(135deg, #03020a 0%, #090817 44%, #05040d 100%);
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -3;
      pointer-events: none;
      background:
        linear-gradient(rgba(255, 255, 255, 0.024) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.024) 1px, transparent 1px);
      background-size: 52px 52px;
      mask-image: radial-gradient(circle at center, black 0%, transparent 72%);
      opacity: 0.34;
    }

    .redirect-bg {
      position: fixed;
      inset: 0;
      z-index: -2;
      pointer-events: none;
      overflow: hidden;
    }

    .orb {
      position: absolute;
      width: 380px;
      height: 380px;
      border-radius: 50%;
      filter: blur(66px);
      opacity: 0.48;
      animation: orbFloat 12s ease-in-out infinite alternate;
    }

    .orb-one {
      top: 70px;
      left: -120px;
      background: rgba(255, 79, 216, 0.36);
    }

    .orb-two {
      top: 160px;
      right: -130px;
      background: rgba(141, 92, 255, 0.28);
      animation-delay: -4s;
    }

    .orb-three {
      left: 34%;
      bottom: -180px;
      background: rgba(255, 154, 92, 0.18);
      animation-delay: -7s;
    }

    @keyframes orbFloat {
      from {
        transform: translate3d(0, 0, 0) scale(1);
      }

      to {
        transform: translate3d(30px, -34px, 0) scale(1.08);
      }
    }

    .redirect-card {
      width: min(680px, 100%);
      position: relative;
      padding: clamp(28px, 6vw, 48px);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background:
        radial-gradient(circle at top left, rgba(255, 79, 216, 0.16), transparent 36%),
        radial-gradient(circle at bottom right, rgba(141, 92, 255, 0.1), transparent 42%),
        linear-gradient(145deg, rgba(26, 18, 48, 0.78), rgba(5, 4, 13, 0.94));
      box-shadow: var(--shadow);
      backdrop-filter: blur(28px);
      overflow: hidden;
      text-align: center;
    }

    .redirect-card::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      border-radius: inherit;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.105), transparent 24%),
        linear-gradient(135deg, rgba(255, 79, 216, 0.062), transparent 45%);
      opacity: 0.75;
    }

    .eyebrow {
      position: relative;
      width: fit-content;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
      padding: 9px 13px;
      border: 1px solid rgba(255, 79, 216, 0.23);
      border-radius: 999px;
      background: rgba(255, 79, 216, 0.1);
      color: #ffd7f6;
      font-size: 12px;
      font-weight: 860;
      letter-spacing: 0.075em;
      text-transform: uppercase;
    }

    h1 {
      position: relative;
      margin: 22px 0 14px;
      font-size: clamp(48px, 8vw, 86px);
      line-height: 0.88;
      font-weight: 960;
      letter-spacing: -0.095em;
      text-shadow:
        0 0 26px rgba(255, 79, 216, 0.2),
        0 0 46px rgba(141, 92, 255, 0.14);
    }

    p {
      position: relative;
      max-width: 560px;
      margin: 0 auto;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.65;
      font-weight: 520;
    }

    .actions {
      position: relative;
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 28px;
    }

    .primary-btn,
    .secondary-btn {
      min-height: 48px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 0 20px;
      cursor: pointer;
      text-decoration: none;
      font-weight: 920;
      transition:
        transform 0.18s ease,
        box-shadow 0.18s ease,
        border-color 0.18s ease,
        background 0.18s ease;
    }

    .primary-btn {
      border: 0;
      background:
        linear-gradient(135deg, #ffffff 0%, #ffd7f6 42%, #ff9bdd 100%);
      color: #120617;
      box-shadow: 0 18px 42px rgba(255, 79, 216, 0.22);
    }

    .secondary-btn {
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
    }

    .primary-btn:hover,
    .secondary-btn:hover {
      transform: translateY(-2px);
    }

    .secondary-btn:hover {
      border-color: rgba(255, 79, 216, 0.32);
      background: rgba(255, 79, 216, 0.1);
    }

    .loader {
      position: relative;
      width: min(320px, 100%);
      height: 8px;
      margin: 28px auto 0;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .loader::before {
      content: "";
      position: absolute;
      inset: 0;
      width: 45%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--pink), var(--violet), var(--sunset));
      animation: loaderMove 1.4s ease-in-out infinite alternate;
      box-shadow: 0 0 24px rgba(255, 79, 216, 0.32);
    }

    @keyframes loaderMove {
      from {
        transform: translateX(-20%);
      }

      to {
        transform: translateX(145%);
      }
    }

    @media (max-width: 620px) {
      body {
        padding: 14px;
      }

      .redirect-card {
        border-radius: 26px;
      }

      .actions {
        flex-direction: column;
      }

      .primary-btn,
      .secondary-btn {
        width: 100%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>

<body>
  <div class="redirect-bg">
    <div class="orb orb-one"></div>
    <div class="orb orb-two"></div>
    <div class="orb orb-three"></div>
  </div>

  <main class="redirect-card">
    <span class="eyebrow">Nordstadt Roleplay</span>

    <h1>Ticketportal umgezogen</h1>

    <p>
      Das alte Ticketportal wurde in das neue Support-Center integriert.
      Du wirst automatisch zu „Meine Tickets“ weitergeleitet.
    </p>

    <div class="loader" aria-hidden="true"></div>

    <div class="actions">
      <a class="primary-btn" href="support-center.html#myTicketsSection">
        Support-Center öffnen
      </a>

      <a class="secondary-btn" href="index.html">
        Zur Website
      </a>
    </div>
  </main>

  <script>
    window.setTimeout(() => {
      window.location.href = "support-center.html#myTicketsSection";
    }, 900);
  </script>
</body>
</html>
